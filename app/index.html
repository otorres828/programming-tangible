<!DOCTYPE html>

<html class="dark" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#1a1a1a",
                        "background-dark": "#0a0a0a",
                        "proto-blue": "#0051a8",
                        "proto-yellow": "#fbd400",
                        "proto-wood": "#fce8d5"
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .mushroom-shape {
            width: 83px;
            height: 62px;
            background-color: #fce8d5;
            border: 2px solid #d4a373;
            position: relative;
            clip-path: path('M 5 36 A 36 36 0 1 1 77 36 L 77 47 L 61 47 L 61 59 L 21 59 L 21 47 L 5 47 Z');
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .dot-pattern {
            display: grid;
            grid-template-areas: ". a ." "b . c";
            gap: 6px;
            transform: translateY(-8px);
        }

        .dot {
            width: 6px;
            height: 6px;
            background-color: #333;
            border-radius: 50%;
        }

        /* Blue Board with 'M' shape bottom and arc top */
        .blue-m-board {
            width: 736px;
            height: 266px;
            background-color: #0051a8;
            position: relative;
            /* Top is a perfect arc, bottom is the 'M' cutout */
            clip-path: path('M 28 236 A 340 210 0 0 1 708 236 C 704 264, 684 300, 650 314 C 602 304, 556 256, 514 206 C 482 180, 444 180, 414 204 C 396 219, 382 230, 368 230 C 354 230, 340 219, 322 204 C 292 180, 254 180, 222 206 C 180 256, 134 304, 86 314 C 52 300, 32 264, 28 236 Z');
            box-shadow: inset 0 10px 30px rgba(0, 0, 0, 0.4);
            border-top: 4px solid rgba(255, 255, 255, 0.1);
        }

        /* Yellow board sitting flush on top of the blue arc */
        .yellow-panel-concave {
            width: 260px;
            height: 162px;
            background-color: #fbd400;
            position: relative;
            /* Top is rounded, bottom is concave to match blue arc curvature (Height scaled by 0.9) */
            clip-path: path('M 13 151 C 4 135, 4 104, 10 65 Q 130 -7 254 65 C 257 104, 257 135, 252 151 Q 130 108 12 151 Z');
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            margin-bottom: -50px;
            /* Offset to overlap slightly and look flush */
        }

        .interface-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 10px;
        }

        /* Helper for vertical orientation of slots */
        .vertical-slot {
            transform: rotate(0deg) !important;
        }
    </style>
</head>

<body class="bg-background-dark font-display text-slate-100 min-h-screen overflow-hidden">
    <div class="layout-container flex h-screen flex-col">
        <!-- Top Navigation Bar -->
        <header
            class="flex items-center justify-between border-b border-white/5 px-8 py-4 bg-black/40 backdrop-blur-md z-50">
            <div class="flex items-center gap-4">
                <div class="p-2 bg-primary rounded-lg text-white">
                    <span class="material-symbols-outlined block">terminal</span>
                </div>
                <div>
                    <h2 class="text-lg font-bold leading-tight tracking-tight">Diagnostic System v2.4</h2>
                    <p class="text-xs text-primary font-medium uppercase tracking-widest">Interface Operativa</p>
                </div>
            </div>
            <div class="flex gap-3">
                <button
                    class="flex items-center justify-center rounded-xl h-10 w-10 bg-white/5 text-white/70 hover:bg-white/10 transition-colors">
                    <span class="material-symbols-outlined">settings</span>
                </button>
                <button
                    class="flex items-center justify-center rounded-xl h-10 w-10 bg-white/5 text-white/70 hover:bg-white/10 transition-colors">
                    <span class="material-symbols-outlined">help</span>
                </button>
                <div class="h-10 w-[1px] bg-white/10 mx-2"></div>
                <div class="flex items-center gap-2 px-3 py-1 bg-green-500/10 rounded-full border border-green-500/30">
                    <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                    <span class="text-xs font-bold text-green-500">ONLINE</span>
                </div>
            </div>
        </header>
        <main class="flex-1 relative flex items-center justify-center">
            <div class="interface-stack">
                <!-- Yellow Sub-board (Concave bottom to match arc) -->
                <div class="yellow-panel-concave">
                    <div class="relative w-full h-full">
                        <div class="absolute left-[3%] top-[42%] -translate-x-1/2 -translate-y-1/2 mushroom-shape scale-[0.75] vertical-slot">
                            <div class="dot-pattern">
                                <div class="dot" style="grid-area:a"></div>
                                <div class="dot" style="grid-area:b"></div>
                                <div class="dot" style="grid-area:c"></div>
                            </div>
                        </div>
                        <div class="absolute left-[33%] top-[28%] -translate-x-1/2 -translate-y-1/2 mushroom-shape scale-[0.75] vertical-slot">
                            <div class="dot-pattern">
                                <div class="dot" style="grid-area:a"></div>
                                <div class="dot" style="grid-area:b"></div>
                                <div class="dot" style="grid-area:c"></div>
                            </div>
                        </div>
                        <div class="absolute left-[63%] top-[42%] -translate-x-1/2 -translate-y-1/2 mushroom-shape scale-[0.75] vertical-slot">
                            <div class="dot-pattern">
                                <div class="dot" style="grid-area:a"></div>
                                <div class="dot" style="grid-area:b"></div>
                                <div class="dot" style="grid-area:c"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Blue Main Board ('M' shape bottom) -->
                <div class="blue-m-board">
                    <!-- 8 Slots following arc but perfectly vertical -->
                    <div class="absolute left-[12%] top-[76%] -translate-x-1/2 -translate-y-1/2">
                        <div class="mushroom-shape vertical-slot">
                            <div class="dot-pattern">
                                <div class="dot" style="grid-area:a"></div>
                                <div class="dot" style="grid-area:b"></div>
                                <div class="dot" style="grid-area:c"></div>
                            </div>
                        </div>
                    </div>
                    <div class="absolute left-[20%] top-[58%] -translate-x-1/2 -translate-y-1/2">
                        <div class="mushroom-shape vertical-slot">
                            <div class="dot-pattern">
                                <div class="dot" style="grid-area:a"></div>
                                <div class="dot" style="grid-area:b"></div>
                                <div class="dot" style="grid-area:c"></div>
                            </div>
                        </div>
                    </div>
                    <div class="absolute left-[32%] top-[43%] -translate-x-1/2 -translate-y-1/2">
                        <div class="mushroom-shape vertical-slot">
                            <div class="dot-pattern">
                                <div class="dot" style="grid-area:a"></div>
                                <div class="dot" style="grid-area:b"></div>
                                <div class="dot" style="grid-area:c"></div>
                            </div>
                        </div>
                    </div>
                    <div class="absolute left-[44%] top-[33%] -translate-x-1/2 -translate-y-1/2">
                        <div class="mushroom-shape vertical-slot">
                            <div class="dot-pattern">
                                <div class="dot" style="grid-area:a"></div>
                                <div class="dot" style="grid-area:b"></div>
                                <div class="dot" style="grid-area:c"></div>
                            </div>
                        </div>
                    </div>
                    <div class="absolute left-[56%] top-[33%] -translate-x-1/2 -translate-y-1/2">
                        <div class="mushroom-shape vertical-slot">
                            <div class="dot-pattern">
                                <div class="dot" style="grid-area:a"></div>
                                <div class="dot" style="grid-area:b"></div>
                                <div class="dot" style="grid-area:c"></div>
                            </div>
                        </div>
                    </div>
                    <div class="absolute left-[68%] top-[43%] -translate-x-1/2 -translate-y-1/2">
                        <div class="mushroom-shape vertical-slot">
                            <div class="dot-pattern">
                                <div class="dot" style="grid-area:a"></div>
                                <div class="dot" style="grid-area:b"></div>
                                <div class="dot" style="grid-area:c"></div>
                            </div>
                        </div>
                    </div>
                    <div class="absolute left-[80%] top-[58%] -translate-x-1/2 -translate-y-1/2">
                        <div class="mushroom-shape vertical-slot">
                            <div class="dot-pattern">
                                <div class="dot" style="grid-area:a"></div>
                                <div class="dot" style="grid-area:b"></div>
                                <div class="dot" style="grid-area:c"></div>
                            </div>
                        </div>
                    </div>
                    <div class="absolute left-[88%] top-[76%] -translate-x-1/2 -translate-y-1/2">
                        <div class="mushroom-shape vertical-slot">
                            <div class="dot-pattern">
                                <div class="dot" style="grid-area:a"></div>
                                <div class="dot" style="grid-area:b"></div>
                                <div class="dot" style="grid-area:c"></div>
                            </div>
                        </div>
                    </div>
                    <!-- Central Control Elements at the tip of the 'M' -->
                    <div class="absolute bottom-[20%] left-1/2 -translate-x-1/2 flex flex-col items-center z-40">
                        <div class="flex gap-4 mb-3">
                            <div
                                class="w-3 h-3 rounded-full bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.8)] border border-white/20">
                            </div>
                            <div
                                class="w-3 h-3 rounded-full bg-red-600 shadow-[0_0_10px_rgba(220,38,38,0.8)] border border-white/20">
                            </div>
                        </div>
                        <button
                            class="w-16 h-16 rounded-full bg-proto-yellow border-4 border-yellow-300 shadow-2xl active:scale-90 transition-transform flex items-center justify-center">
                            <div class="w-[3.2rem] h-[3.2rem] rounded-full border-2 border-yellow-600/30"></div>
                        </button>
                    </div>
                </div>
            </div>
            <!-- Ambient Glow -->
            <div
                class="absolute inset-0 pointer-events-none opacity-20 bg-[radial-gradient(circle_at_center,_rgba(236,91,19,0.1)_0%,_transparent_70%)]">
            </div>
        </main>
       
    </div>
</body>

</html>
